name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            *.md
            !CHANGELOG.md

  link-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --accept 200,204,301,302,403,429
            --exclude-path node_modules
            --exclude '^https?://(localhost|127\.0\.0\.1|.*\.example).*'
            CLAUDE.md CLAUDE.agent.md LEARNINGS.md WORKFLOW.md README.md
          fail: true
